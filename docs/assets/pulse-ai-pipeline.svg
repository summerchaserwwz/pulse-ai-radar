        <circle cx="28" cy="30" r="6" fill="#6ee7b7"/>
        <text x="46" y="36" fill="#6ee7b7" font-size="15" font-weight="600">05 / DELIVER</text>
        <text x="22" y="83" fill="#f8fbf9" font-size="24" font-weight="650">个性化输出</text>
        <text x="22" y="115" fill="#b8dacb" font-size="15">Web · RSS · 分享页</text>
        <text x="22" y="143" fill="#7fa995" font-size="13">Cursor-paged history</text>
      </g>
    </g>

    <rect x="72" y="490" width="1056" height="70" rx="10" fill="#0f1512" stroke="#203c30"/>
    <text x="98" y="520" fill="#6ee7b7" font-size="14" font-weight="600">RUNS ON CLOUDFLARE</text>
    <text x="98" y="546" fill="#c5cec8" font-size="15">Cron Triggers · Queues · Workers AI · D1 · Vectorize · R2</text>
    <text x="1100" y="538" fill="#34d399" font-size="18" text-anchor="end">AUTONOMOUS</text>
